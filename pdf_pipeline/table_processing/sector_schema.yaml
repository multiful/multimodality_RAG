# --- Sector -> TableType -> Field 매핑(참고/확장용, 추출 게이팅에는 미사용 — [19]에서
#     "표 하나만 보고 섹터를 못 맞춘다"는 사용자 피드백을 그대로 유지) ---
sectors:
  음식료품:
    table_types:
      원재료가격: [raw_material_price]
      판가전략: [product_price, pricing_power, domestic_export_mix]
  섬유의복:
    table_types:
      재고자산: [inventory_turnover, inventory_valuation_loss]
      수주현황: [order_backlog, brand_sales_growth, utilization_rate]
  종이목재:
    table_types:
      원가: [pulp_price, utilization_rate]
      판가: [paper_price]
  화학:
    table_types:
      스프레드: [spread, naphtha_price, product_price]
      설비증설: [capacity_expansion, maintenance_schedule, utilization_rate]
  의약품:
    table_types:
      파이프라인: [clinical_pipeline, rd_expense_treatment, patent_expiry]
      기술수출: [licensing_deal]
  비금속광물:
    table_types:
      원자재단가: [coal_price, cement_price]
      전방산업: [product_mix]
  철강금속:
    table_types:
      원자재가격: [iron_ore_price, china_steel_price]
      판가협상: [spread, product_price]
  기계:
    table_types:
      수주현황: [order_backlog, new_orders, contract_counterparty, contract_amount, contract_period]
      지역별매출: [product_mix]
  전기전자:
    table_types:
      가동률CAPEX: [utilization_rate, capex]
      부품단가: [product_price]
  의료정밀:
    table_types:
      소모품매출: [consumable_sales_ratio]
      인증수출: [approval_status, product_mix]
  운수장비:
    table_types:
      조선수주: [order_backlog, ship_price_index, heavy_tail_contract, construction_loss_provision]
      자동차판가: [product_price, ev_mix, finance_provision, fx_sensitivity]
  유통업:
    table_types:
      SSSG: [sss_growth]
      채널별GMV: [gmv, rent_promotion_cost, online_sales_ratio]
  전기가스업:
    table_types:
      규제요금: [regulated_tariff, utility_receivable]
      도입가: [smp, lng_price, generation_capacity]
  건설업:
    table_types:
      수주잔고: [order_backlog, new_orders, contract_counterparty, contract_amount, contract_period]
      미분양: [unsold_units, completion_rate]
      PF: [pf_guarantee]
      공사진행률: [completion_rate, cost_ratio]
      청약분양동향: [presale_competition_rate, presale_price, presale_units, presale_shortfall]
      부동산시황: [apartment_price_index, real_estate_supply_demand_index,
                base_interest_rate, household_loan_balance]
  운수창고업:
    table_types:
      운임지수: [freight_index]
      물동량: [cargo_volume, cask_rask, load_factor, fx_sensitivity]
  통신업:
    table_types:
      ARPU: [subscribers, arpu, churn_rate, penetration_rate]
      마케팅비CAPEX: [marketing_cost, capex, b2b_growth]
  금융업:
    table_types:
      주주환원: [shareholder_return_ratio, bis_ratio]
      자회사이익: [product_mix]
  은행:
    table_types:
      NIM: [nim, loan_deposit]
      NPL: [npl_ratio]
  증권:
    table_types:
      수수료손익: [brokerage_fee, ib_revenue]
      PF트레이딩: [trading_income, pf_contingent_liability]
  보험:
    table_types:
      CSM: [new_business_csm, csm_balance]
      K-ICS: [solvency_ratio, loss_ratio, experience_variance]
  서비스업:
    table_types:
      MAU_GMV: [mau, gmv, monetization]
      엔터실적: [ip_sales, tour_ticket]
      엔터실적세그먼트: [direct_participation_revenue, indirect_participation_revenue,
                    concert_revenue, ad_appearance_revenue, md_licensing_revenue,
                    content_revenue, fanclub_revenue, overseas_ip_expansion]

# --- Derived Signal: 필드 트렌드 조합 -> 정성적 투자 시그널(참고 예시, 섹터별 대표 몇 개만
#     구체화 — 21개 섹터 전부를 정교하게 채우려면 실제 리포트로 룰 검증이 필요해 우선 프레임만) ---
derived_signals:
  pricing_power:
    trigger: {fields: [raw_material_price, product_price], pattern: "raw_up_price_up"}
    meaning: positive
    description: "원재료가 오르는데 판가도 같이 올리면(전가력 있음) 마진 유지 -> 긍정적"
  pf_risk:
    trigger: {fields: [unsold_units, pf_guarantee], pattern: "both_up"}
    meaning: negative
    description: "미분양과 PF보증이 동시 증가 -> 현금흐름 위험 -> 부정적"
  cycle_bottom:
    trigger: {field: spread, pattern: "trough"}
    meaning: neutral_to_positive
    description: "스프레드가 저점권 -> 업황 바닥 근접 신호"
  cycle_peak:
    trigger: {field: spread, pattern: "peak"}
    meaning: neutral_to_negative
    description: "스프레드가 고점권 -> 업황 피크아웃 신호"
  credit_cost_pressure:
    trigger: {fields: [nim, npl_ratio], pattern: "nim_down_npl_up"}
    meaning: negative
    description: "NIM 하락+NPL 상승 -> 충당금 증가 -> 실적 압박"
  brokerage_sensitivity:
    trigger: {field: brokerage_fee, pattern: "down"}
    meaning: negative
    description: "거래대금 감소로 브로커리지 수익 감소"
  memory_cycle_down:
    trigger: {fields: [capex, utilization_rate], pattern: "capex_down_util_down"}
    meaning: negative
    description: "CAPEX 축소+가동률 하락 -> 메모리 다운사이클 -> ASP 하락 압력"
  backlog_growth:
    trigger: {field: order_backlog, pattern: "up"}
    meaning: positive
    description: "수주잔고 증가 -> 향후 매출 가시성 개선"
  backlog_decline:
    trigger: {field: order_backlog, pattern: "down"}
    meaning: negative
    description: "수주잔고 감소 -> 향후 매출 공백 우려"
  margin_expansion:
    trigger: {field: spread, pattern: "up"}
    meaning: positive
    description: "스프레드 확대 -> 마진 개선"

investment_meaning:
  positive: "긍정적 투자 시그널 — 실적/현금흐름 개선 방향"
  negative: "부정적 투자 시그널 — 실적/현금흐름 악화 방향"
  neutral_to_positive: "업황 반등 가능성 있는 중립~긍정 신호"
  neutral_to_negative: "업황 둔화 가능성 있는 중립~부정 신호"
