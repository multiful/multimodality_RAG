# [20] Sector -> TableType -> Field 계층 스키마 (사용자 설계 반영)
#
# 추출 게이팅은 여전히 Field-first(표 하나만 보고 섹터를 못 맞추는 문제, [19]에서 이미 확인)지만,
# Sector/TableType은 "그 섹터 리포트에서 어떤 표 유형이 나올지 미리 알고 매칭 우선순위를 조정"하는
# 참고/확장 레이어로 추가한다. 새 섹터·필드 추가가 코드 수정 없이 이 YAML만 고치면 되게 설계.
#
# fields의 각 항목:
#   aliases: 리포트 표기 변형(Canonical Field Normalization)
#   value_type: numeric_amount | percent | text | date_range  (값 정제 방식 결정)
#   unit: 이 필드의 기본 단위(추출 시 값에서 실제 단위를 못 읽으면 이 기본값 사용)
#   category: 참고용 그룹핑

